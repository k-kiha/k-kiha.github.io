    url: "https://github.com/k-kiha/PaScaL_BTDMA"
    cats: "GPU / parallel computing · CUDA · MPI · tridiagonal solvers"
    desc: "Communication-avoiding solvers (PaScaL_TDMA 2.1, PaScaL_BTDMA) for the batched (block-)tridiagonal systems in implicit CFD — exchanging only subdomain boundary rows, independent of system length."
    result: "<b>14.0× / 20.7×</b> on A100 / H100 · <b>91–97%</b> weak-scaling on 8× H200 · <b>64 GH200</b> (1024³)"
    links:
