about: >
  I work on parallel, scalable solvers for the linear systems that arise in large-scale CFD —
  tridiagonal, block-tridiagonal, and sparse — and on direct and large-eddy simulation of turbulent
  flows. Recent work targets distributed multi-GPU systems (NVIDIA A100 · H100 · H200 · GH200).

