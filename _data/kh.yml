  - title: "GPU sparse linear solver for reactor thermal-hydraulics"
    url: "https://github.com/k-kiha/cuda-sparse-solver-extract"
    cats: "Numerical solvers · cuSPARSE · cuBLAS · AmgX · Krylov"
    desc: "A GPU solver for sparse systems (CSR <code>Ax=b</code>) — BiCGStab with ILU(0) / algebraic-multigrid — integrated into the CUPID reactor code through a C ABI."
    result: ""
    links:
      - { text: "cuda-sparse-solver-extract", url: "https://github.com/k-kiha/cuda-sparse-solver-extract" }
      - { text: "simulations →", url: "/simulations/" }
