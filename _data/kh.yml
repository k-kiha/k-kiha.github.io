    url: "https://github.com/MPMC-Lab/PaScaL_TCS"
    cats: "CFD / turbulence · DNS · LES · heat transfer"
    desc: "DNS of turbulent Rayleigh–Bénard convection and differentially heated channels, and LES of cleanroom flows — near-wall turbulence, heat transport, and non-Oberbeck–Boussinesq effects (PaScaL_TCS)."
    result: "<b>~2×10¹⁰</b> grid points · <b>131,072</b> cores · LES up to <b>8×10⁹</b> grid points"
    links:
