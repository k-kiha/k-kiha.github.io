<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.data.kh.name }}{% if page.title %} · {{ site.data.kh.name }}{% endif %}</title>
<meta name="description" content="{{ site.data.kh.role | strip_html }}">
<link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}">
<style>
  :root{
    --bg:#f2f2f3; --surface:#ffffff; --side:#ededee; --shadow:0 2px 6px rgba(0,0,0,.07);
    --ink:#1b1b18; --muted:#66665f; --faint:#93938b;
    --line:rgba(20,20,10,.12); --line-soft:rgba(20,20,10,.07);
    --accent:#2560ea; --accent-ink:#1c4fd0; --accent2:#dd7a2e; --accent2-ink:#bf6317;
    --tag-bg:#e9eefb; --tag-ink:#2456d8;
    --serif:Charter,"Bitstream Charter","Iowan Old Style","Palatino Linotype",Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --maxw:1120px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#17181a; --surface:#202226; --side:#26282c; --shadow:0 2px 10px rgba(0,0,0,.4);
      --ink:#e6e7e2; --muted:#9b9d97; --faint:#70736c;
      --line:rgba(255,255,255,.12); --line-soft:rgba(255,255,255,.06);
      --accent:#8ab0ff; --accent-ink:#a6c2ff; --accent2:#f0a45a; --accent2-ink:#f4b878; --tag-bg:#2a2c31; --tag-ink:#a6c2ff;
    }
  }
  :root[data-theme="light"]{
    --bg:#f2f2f3; --surface:#ffffff; --side:#ededee; --shadow:0 2px 6px rgba(0,0,0,.07); --ink:#1b1b18; --muted:#66665f; --faint:#93938b;
    --line:rgba(20,20,10,.12); --line-soft:rgba(20,20,10,.07); --accent:#2560ea; --accent-ink:#1c4fd0; --accent2:#dd7a2e; --accent2-ink:#bf6317; --tag-bg:#e9eefb; --tag-ink:#2456d8;
  }
  :root[data-theme="dark"]{
    --bg:#17181a; --surface:#202226; --side:#26282c; --shadow:0 2px 10px rgba(0,0,0,.4); --ink:#e6e7e2; --muted:#9b9d97; --faint:#70736c;
    --line:rgba(255,255,255,.12); --line-soft:rgba(255,255,255,.06); --accent:#8ab0ff; --accent-ink:#a6c2ff; --accent2:#f0a45a; --accent2-ink:#f4b878; --tag-bg:#2a2c31; --tag-ink:#a6c2ff;
  }

  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--serif); line-height:1.68; font-size:17px; -webkit-font-smoothing:antialiased; overflow-x:hidden}
  a{color:var(--accent); text-decoration:none}
  a:hover{color:var(--accent-ink); text-decoration:underline}
  h1,h2,h3{margin:0; text-wrap:balance; font-weight:600}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 clamp(18px,4vw,36px)}
  code{font-family:var(--mono); font-size:.9em; background:var(--tag-bg); padding:1px 5px; border-radius:3px}

  .topnav{position:sticky; top:0; z-index:20; background:var(--surface); box-shadow:0 1px 8px rgba(0,0,0,.06); border-bottom:1px solid var(--line-soft)}
  .navwrap{max-width:var(--maxw); margin:0 auto; padding:12px clamp(18px,4vw,36px); display:flex; align-items:center; justify-content:space-between; gap:14px}
  .brand{font-family:var(--serif); font-size:18px; font-weight:600; color:var(--ink)}
  .brand:hover{text-decoration:none; color:var(--ink)}
  .navlinks{display:flex; gap:2px; flex-wrap:wrap; font-family:var(--sans)}
  .navlinks a{font-size:13.5px; color:var(--muted); padding:6px 11px; border-radius:4px}
  .navlinks a:hover{color:var(--accent-ink); text-decoration:none; background:var(--side)}
  .navlinks a.here{color:var(--ink); background:var(--side)}

  .layout{display:grid; grid-template-columns:minmax(0,1fr) 292px; gap:46px; align-items:start; padding:clamp(28px,5vw,52px) 0}
  main{min-width:0}
  aside{position:sticky; top:74px}

  section{margin-bottom:clamp(34px,5vw,52px)}
  .eyebrow{font-family:var(--sans); font-size:12px; font-weight:600; letter-spacing:.09em; text-transform:uppercase; color:var(--accent2-ink); margin:0 0 16px; padding-bottom:8px; border-bottom:1px solid var(--line)}

  .intro{background:var(--surface); border:1px solid var(--line-soft); border-radius:10px; box-shadow:var(--shadow); padding:clamp(22px,3vw,30px)}
  .intro h1{font-size:clamp(28px,4vw,38px); letter-spacing:-.015em; line-height:1.1; margin:0 0 6px}
  .intro .role{font-family:var(--sans); font-size:15px; color:var(--muted); margin:0 0 20px}
  .intro p{font-size:17.5px; color:var(--ink); margin:0 0 20px; max-width:62ch}

  .metrics{display:flex; flex-wrap:wrap; gap:0; border:1px solid var(--line); border-radius:4px; overflow:hidden; background:var(--side); font-family:var(--sans)}
  .metric{flex:1 1 130px; padding:13px 16px; border-right:1px solid var(--line-soft)}
  .metric:last-child{border-right:none}
  .metric .v{font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:18px; font-weight:600; color:var(--accent2-ink)}
  .metric .k{font-size:11.5px; color:var(--faint); margin-top:2px}

  .entry{background:var(--surface); border:1px solid var(--line-soft); border-radius:10px; box-shadow:var(--shadow); padding:20px 22px; margin-bottom:16px}
  .entry:last-child{margin-bottom:0}
  .entry h3{font-size:20px; line-height:1.25; margin:0 0 7px}
  .entry h3 a{color:var(--ink)}
  .entry h3 a:hover{color:var(--accent-ink)}
  .entry .cats{font-family:var(--sans); font-size:11.5px; color:var(--faint); margin:0 0 9px}
  .entry .cats .c{color:var(--tag-ink)}
  .entry .d{color:var(--muted); font-size:15.5px; margin:0 0 9px}
  .entry .res{font-family:var(--sans); font-size:14px; margin:0 0 11px; color:var(--ink)}
  .entry .res b{font-family:var(--mono); font-variant-numeric:tabular-nums; color:var(--accent-ink); font-weight:600}
  .entry .lk{font-family:var(--sans); font-size:13px; display:flex; gap:14px; flex-wrap:wrap}

  .pubs{background:var(--surface); border:1px solid var(--line-soft); border-radius:10px; box-shadow:var(--shadow); padding:4px 22px}
  .pub{display:grid; grid-template-columns:52px 1fr; gap:16px; padding:13px 0; border-bottom:1px solid var(--line-soft)}
  .pub:last-child{border-bottom:none}
  .pub .yr{font-family:var(--mono); font-size:13px; color:var(--faint); font-variant-numeric:tabular-nums}
  .pub .t{font-size:16px; line-height:1.45}
  .pub .venue{font-style:italic; color:var(--muted)}
  .pub .auth{display:block; font-family:var(--sans); font-size:12px; color:var(--faint); margin-top:4px}
  .pub .auth b{color:var(--muted); font-weight:600}
  .pub .badge{font-family:var(--sans); font-size:11px; color:var(--accent-ink); border:1px solid var(--accent); border-radius:3px; padding:0 6px; margin-left:6px; white-space:nowrap}
  .pub .status{font-family:var(--sans); font-size:11px; color:var(--muted); border:1px solid var(--line); border-radius:3px; padding:0 6px; margin-left:6px}
  .pub .doi{font-family:var(--sans); font-size:12px; margin-left:8px}
  .pubmore{font-family:var(--sans); font-size:13.5px; color:var(--muted); margin-top:16px}

  .card{background:var(--surface); border:1px solid var(--line-soft); border-radius:10px; box-shadow:var(--shadow); padding:20px; margin-bottom:18px}
  .pcard{text-align:center}
  .pcard .photo{width:104px; height:104px; border-radius:50%; object-fit:cover; margin:0 auto 14px; display:block; border:2px solid color-mix(in srgb,var(--accent) 40%,var(--line))}
  .pcard .nm{font-size:19px; font-weight:600; margin:0 0 2px}
  .pcard .ti{font-family:var(--sans); font-size:12.5px; color:var(--muted); margin:0 0 4px}
  .pcard .tg{font-family:var(--sans); font-size:12.5px; color:var(--faint); margin:0 0 14px}
  .pcard .social{display:flex; justify-content:center; flex-wrap:wrap; gap:8px; font-family:var(--sans); font-size:12.5px; margin-bottom:14px}
  .pcard .social a{color:var(--muted)}
  .pcard .social a:hover{color:var(--accent-ink); text-decoration:none}
  .cvbtn{display:block; font-family:var(--sans); font-size:13px; text-align:center; padding:8px; border-radius:4px; background:var(--accent); color:#fff; border:1px solid var(--accent)}
  .cvbtn:hover{filter:brightness(1.06); color:#fff; text-decoration:none}
  .cvbtn .soon{font-size:10px; opacity:.8; text-transform:uppercase; letter-spacing:.08em; margin-left:5px}

  .side-h{font-family:var(--sans); font-size:11.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); margin:0 0 12px}
  .topics{list-style:none; margin:0; padding:0; font-family:var(--sans); font-size:14px}
  .topics li{display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--line-soft); color:var(--ink)}
  .topics li:last-child{border-bottom:none}
  .topics li .n{font-family:var(--mono); font-size:12px; color:var(--faint)}
  .tags{display:flex; flex-wrap:wrap; gap:6px}
  .tags .tag{font-family:var(--sans); font-size:12px; color:var(--tag-ink); background:var(--tag-bg); border-radius:3px; padding:3px 8px}
  .glance{font-family:var(--sans); font-size:13.5px; color:var(--muted); line-height:1.9}
  .glance b{font-family:var(--mono); color:var(--ink); font-weight:600}

  .gallery-head{padding-top:8px}
  .backlink{font-family:var(--sans); font-size:13px; display:inline-block; margin-bottom:14px}
  .gtitle{font-size:clamp(24px,3.4vw,32px); margin:0 0 8px}
  .gintro{color:var(--muted); max-width:60ch; margin:0 0 6px}
  .simgroup{margin-top:34px}
  .simgroup .gl{font-family:var(--sans); font-size:14px; font-weight:600; color:var(--ink); margin:0 0 3px}
  .simgroup .gs{font-family:var(--sans); font-size:13px; color:var(--muted); margin:0 0 12px}
  .vidgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px}
  .vembed{position:relative; aspect-ratio:16/9; border-radius:7px; overflow:hidden; border:1px solid var(--line); background:var(--side)}
  .vembed iframe{position:absolute; inset:0; width:100%; height:100%; border:0}

  footer{border-top:1px solid var(--line); padding:26px 0 46px; font-family:var(--sans); font-size:13px; color:var(--muted); margin-top:20px}
  .foot{display:flex; flex-wrap:wrap; justify-content:space-between; gap:12px}
  .foot a{color:var(--muted)} .foot a:hover{color:var(--accent-ink); text-decoration:none}

  a:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  @media (max-width:820px){
    .layout{grid-template-columns:1fr; gap:8px}
    aside{position:static; margin-top:10px}
    .metric{flex-basis:50%}
  }
</style>
</head>
<body>
  <nav class="topnav">
    <div class="navwrap">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.data.kh.name }}</a>
      <div class="navlinks">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/#projects' | relative_url }}">Projects</a>
        <a href="{{ '/#publications' | relative_url }}">Publications</a>
        <a href="{{ '/simulations/' | relative_url }}">Simulations</a>
        {% if site.data.kh.cv_url and site.data.kh.cv_url != "" %}<a href="{{ site.data.kh.cv_url }}">CV</a>{% else %}<a href="#" title="PDF coming soon">CV</a>{% endif %}
      </div>
    </div>
  </nav>

  {{ content }}

  <footer>
    <div class="wrap foot">
      <div>{{ site.data.kh.name }} · {{ site.data.kh.affiliation }} · {{ site.data.kh.email }}</div>
      <div>
        <a href="{{ site.data.kh.links.github }}" target="_blank" rel="noopener">GitHub</a> ·
        <a href="{{ site.data.kh.links.scholar }}" target="_blank" rel="noopener">Scholar</a> ·
        <a href="{{ site.data.kh.links.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
  </footer>
</body>
</html>
